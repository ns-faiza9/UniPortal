<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Two Panel Login Page</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
    }

    body, html {
      height: 100%;
    }

    header {
      width: 100%;
      padding: 20px 40px;
      background-color: #4A90E2;
      color: white;
      font-size: 2rem;
      font-weight: bold;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .container {
      display: flex;
      height: calc(100vh - 80px); /* Adjust height to account for header */
    }

    .left-panel {
      flex: 1;
      background: url('g2.jpg') no-repeat center center;
      background-size: cover;
    }

    .right-panel {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #f4f6fc;
    }

    .login-box {
      width: 80%;
      max-width: 400px;
      padding: 40px;
      background: white;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      border-radius: 8px;
    }

    .login-box h2 {
      margin-bottom: 20px;
      text-align: center;
      color: #333;
    }

    .login-box input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .login-box button {
      width: 100%;
      padding: 10px;
      background-color: #4A90E2;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .login-box button:hover {
      background-color: #357ABD;
    }
  </style>
</head>
<body>
  <header>
    Welcome to EduPortal
  </header>
  <div class="container">
    <div class="left-panel">
      <!-- Image is set via CSS background -->
    </div>
    <div class="right-panel">
      <div class="login-box">
        <h2>Login</h2>
        <form>
          <input type="text" placeholder="Username" required>
          <input type="password" placeholder="Password" required>
          <button type="submit">Login</button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
